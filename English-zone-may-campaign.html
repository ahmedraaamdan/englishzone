<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Campaign Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#3170C4;--dark:#081A33;--bg:#F4F8FD;--card:#fff;--muted:#5A7290;--border:rgba(49,112,196,.14);--shadow:0 8px 28px rgba(13,45,94,.10);--radius:18px;font-family:'Cairo',sans-serif}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;line-height:1.8}
header{background:linear-gradient(135deg,var(--dark),var(--primary));color:#fff;text-align:center;padding:58px 20px 48px;position:relative;overflow:hidden}
header:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.16),transparent 30%),radial-gradient(circle at 80% 10%,rgba(255,255,255,.12),transparent 35%)}
.header-inner{position:relative;max-width:1000px;margin:auto}.logo{max-width:420px;width:80%;margin:0 auto 24px;display:none}.badge{display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:7px 18px;border-radius:999px;font-size:12px;font-weight:800;margin-bottom:22px}h1{font-size:clamp(32px,6vw,58px);font-weight:900;margin-bottom:14px}header p{max-width:680px;margin:auto;color:rgba(255,255,255,.82);font-size:17px}.stats{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:14px;max-width:760px;margin:34px auto 0}.stat{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:17px}.stat strong{font-size:26px;display:block}.stat span{font-size:12px;color:rgba(255,255,255,.75)}nav{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.05)}nav .wrap{max-width:1050px;margin:auto;display:flex;gap:8px;overflow:auto;padding:10px 16px}nav a{white-space:nowrap;text-decoration:none;color:var(--muted);font-size:13px;font-weight:800;padding:10px 14px;border-radius:999px}nav a:hover{background:var(--bg);color:var(--primary)}main{max-width:1050px;margin:auto;padding:32px 18px}.section{margin-bottom:34px}.sec-title{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--primary);font-weight:900;margin-bottom:14px}.hero-card{background:linear-gradient(135deg,var(--dark),var(--primary));color:#fff;border-radius:var(--radius);padding:36px 24px;text-align:center;box-shadow:var(--shadow)}.hero-card h2{font-size:clamp(26px,4vw,42px);font-weight:900;margin-bottom:12px}.hero-card p{color:rgba(255,255,255,.82);max-width:720px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}.card h3{font-size:19px;margin-bottom:10px;color:var(--dark)}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}.pill{background:var(--bg);color:var(--primary);font-size:12px;font-weight:800;border-radius:999px;padding:5px 10px}.body-text{white-space:pre-wrap;color:#16345F;font-size:14px}.calendar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}.day{background:#fff;border:1px solid var(--border);border-radius:15px;padding:15px;box-shadow:var(--shadow)}.day .num{font-weight:900;color:var(--primary);font-size:13px}.day .type{display:inline-block;margin:8px 0;background:var(--bg);padding:3px 9px;border-radius:99px;font-size:11px;font-weight:800;color:var(--muted)}.day h4{font-size:14px;line-height:1.6}footer{text-align:center;background:var(--dark);color:rgba(255,255,255,.65);padding:25px;font-size:13px}.status{max-width:1050px;margin:20px auto 0;padding:14px 18px;border-radius:14px;background:#fff4d6;color:#8a5a00;border:1px solid #ffe3a3;font-weight:800;display:none}@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}header{padding-top:38px}}
</style>
</head>
<body>
<header id="top">
  <div class="header-inner">
    <img id="logo" class="logo" alt="Logo" />
    <div class="badge" id="badge">Loading campaign</div>
    <h1 id="heroTitle">Campaign Title</h1>
    <p id="heroSubtitle">Campaign subtitle</p>
    <div class="stats">
      <div class="stat"><strong id="kpiReach">0</strong><span>Reach</span></div>
      <div class="stat"><strong id="kpiEngagement">0</strong><span>Engagement</span></div>
      <div class="stat"><strong id="kpiLeads">0</strong><span>Leads</span></div>
      <div class="stat"><strong id="kpiVisits">0</strong><span>Visits</span></div>
    </div>
  </div>
</header>
<div id="status" class="status"></div>
<nav><div class="wrap"><a href="#bigidea">Big Idea</a><a href="#scripts">Scripts</a><a href="#posts">Posts</a><a href="#stories">Stories</a><a href="#calendar">Calendar</a><a href="#kpis">KPIs</a></div></nav>
<main>
  <section id="bigidea" class="section">
    <div class="sec-title">Big Idea</div>
    <div class="hero-card"><h2 id="slogan">Slogan</h2><p id="bigIdea">Big idea</p></div>
  </section>
  <section id="scripts" class="section"><div class="sec-title">Scripts</div><div id="scriptsGrid" class="grid"></div></section>
  <section id="posts" class="section"><div class="sec-title">Posts</div><div id="postsGrid" class="grid"></div></section>
  <section id="stories" class="section"><div class="sec-title">Stories</div><div id="storiesGrid" class="grid"></div></section>
  <section id="calendar" class="section"><div class="sec-title">Calendar</div><div id="calendarGrid" class="calendar-grid"></div></section>
  <section id="kpis" class="section"><div class="sec-title">KPIs</div><div id="kpisGrid" class="grid"></div></section>
</main>
<footer id="footerText">Campaign Preview</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(async function () {
  const client = window.supabase.createClient(
    "https://nnhxnswtzcqjnsmvytzr.supabase.co",
    "sb_publishable_TEVg9kp64afnKNYl-rNqBQ_c8dNHb09"
  );

  const $ = id => document.getElementById(id);
  const safe = v => String(v ?? "").replace(/[&<>"']/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[m]));

  function setStatus(msg){
    const el = $("status");
    el.style.display = "block";
    el.textContent = msg;
  }

  function render(c){
    document.title = `${c.client?.name || "Client"} — ${c.client?.campaignName || "Campaign"}`;

    $("badge").textContent = `${c.client?.name || ""} • ${c.client?.campaignName || ""}`;
    $("heroTitle").textContent = c.hero?.title || c.client?.campaignName || "Campaign Title";
    $("heroSubtitle").textContent = c.hero?.subtitle || "";

    $("slogan").textContent = c.slogan || c.client?.campaignName || "";
    $("bigIdea").textContent = c.bigIdea || "";

    $("kpiReach").textContent = c.kpis?.reach || "0";
    $("kpiEngagement").textContent = c.kpis?.engagement || "0";
    $("kpiLeads").textContent = c.kpis?.leads || "0";
    $("kpiVisits").textContent = c.kpis?.visits || "0";

    $("footerText").textContent = `${c.client?.name || ""} — ${c.client?.campaignName || ""}`;

    if (c.theme) {
      document.documentElement.style.setProperty("--primary", c.theme.primary || "#3170C4");
      document.documentElement.style.setProperty("--dark", c.theme.dark || "#081A33");
      document.documentElement.style.setProperty("--bg", c.theme.background || "#F4F8FD");
      document.body.style.background = c.theme.background || "#F4F8FD";

      if (c.theme.logo) {
        $("logo").src = c.theme.logo;
        $("logo").style.display = "block";
      }
    }

    $("scriptsGrid").innerHTML = (c.scripts || []).length
      ? c.scripts.map((s,i)=>`
        <div class="card">
          <h3>سكريبت ${i+1}: ${safe(s.title || "")}</h3>
          <div class="meta">
            ${s.location ? `<span class="pill">${safe(s.location)}</span>` : ""}
            ${s.actors ? `<span class="pill">${safe(s.actors)}</span>` : ""}
          </div>
          <div class="body-text">${safe(s.body || s.summary || "")}</div>
        </div>
      `).join("")
      : `<div class="card">لا توجد سكريبتات بعد</div>`;

    $("postsGrid").innerHTML = (c.posts || []).length
      ? c.posts.map((p,i)=>`
        <div class="card">
          <h3>Post ${i+1}</h3>
          <p><b>TOV:</b></p>
          <div class="body-text">${safe(p.tov || "-")}</div>
          <br>
          <p><b>Caption:</b></p>
          <div class="body-text">${safe(p.caption || "-")}</div>
        </div>
      `).join("")
      : `<div class="card">لا توجد بوستات بعد</div>`;

    $("storiesGrid").innerHTML = (c.stories || []).length
      ? c.stories.map((s,i)=>`
        <div class="card">
          <h3>Story ${i+1}</h3>
          <div class="body-text">${safe(s)}</div>
        </div>
      `).join("")
      : `<div class="card">لا توجد ستوريز بعد</div>`;

    $("calendarGrid").innerHTML = (c.calendar || []).length
      ? c.calendar.map((item,i)=>`
        <div class="day">
          <div class="num">Day ${safe(item.day || i+1)}</div>
          ${item.type ? `<span class="type">${safe(item.type)}</span>` : ""}
          <h4>${safe(item.title || "")}</h4>
          ${item.notes ? `<p class="body-text">${safe(item.notes)}</p>` : ""}
        </div>
      `).join("")
      : `<div class="day">لا يوجد كاليندر بعد</div>`;

    $("kpisGrid").innerHTML = Object.entries(c.kpis || {}).map(([k,v])=>`
      <div class="card">
        <h3>${safe(k)}</h3>
        <div class="body-text" style="font-size:24px;font-weight:900;color:var(--primary)">
          ${safe(v)}
        </div>
      </div>
    `).join("");
  }

  try {
    setStatus("Loading campaign...");

    const { data, error } = await client
      .from("campaign_content")
      .select("*")
      .eq("id", "main")
      .maybeSingle();

    if (error) throw error;
    if (!data || !data.data) throw new Error("No data found");

    console.log("Loaded campaign:", data.data);
    render(data.data);
    $("status").style.display = "none";

  } catch (err) {
    console.error("Preview load error:", err);
    setStatus("Error loading campaign. افتح Console وشوف الخطأ.");
  }
})();
</script>

</body>
</html>
