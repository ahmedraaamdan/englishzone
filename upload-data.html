async function uploadData() {
  const btn = document.getElementById("uploadBtn");
  const status = document.getElementById("status");
  
  btn.disabled = true;
  btn.textContent = "⏳ جاري الرفع...";
  status.className = "status info";
  status.textContent = "⏳ بيترفع على Supabase...";
  status.style.display = "block";
  
  try {
    const { error } = await sb.from("campaign_content").upsert({
      id: "main",
      data: CAMPAIGN_DATA,
      updated_at: new Date().toISOString()
    }, { onConflict: "id" });
    
    if (error) throw error;
    
    status.className = "status ok";
    status.textContent = "✅ تم الرفع بنجاح! افتح preview.html دلوقتي.";
    btn.textContent = "✅ تم!";
  } catch(err) {
    console.error(err);
    status.className = "status bad";
    status.textContent = "❌ فشل: " + err.message;
    btn.disabled = false;
    btn.textContent = "🔄 حاول تاني";
  }
}
