<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campaign OS — JSON Uploader</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2563EB;--dark:#0F172A;--card:#1E293B;
  --border:#334155;--muted:#94A3B8;--gold:#E8B84B;
}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:white;min-height:100vh;padding:32px 16px}
.page{max-width:780px;margin:auto;display:flex;flex-direction:column;gap:20px}

.header{text-align:center;padding:8px 0 16px}
.header h1{font-size:26px;font-weight:900;margin-bottom:6px}
.header p{color:var(--muted);font-size:14px}

/* DROP ZONE */
.drop-zone{border:2px dashed var(--border);border-radius:20px;padding:48px 24px;text-align:center;cursor:pointer;transition:all .25s;background:#0F172A;position:relative}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--primary);background:rgba(37,99,235,.06)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:48px;margin-bottom:16px}
.drop-title{font-size:18px;font-weight:900;margin-bottom:6px}
.drop-sub{font-size:13px;color:var(--muted)}
.drop-sub span{color:var(--primary);font-weight:700}

/* FILE BADGE */
.file-badge{display:none;align-items:center;gap:10px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:12px;padding:12px 16px;font-size:13px;font-weight:700;color:#86EFAC}
.file-badge.show{display:flex}
.file-badge .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-badge .clear-btn{background:transparent;border:none;color:#F87171;font-size:18px;cursor:pointer;padding:0 4px;line-height:1}

/* PREVIEW CARD */
.preview-card{background:var(--card);border-radius:20px;padding:24px;display:none}
.preview-card.show{display:block}
.preview-title{font-size:16px;font-weight:900;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.stat-box{background:#0F172A;border-radius:12px;padding:14px;text-align:center}
.stat-box .stat-val{font-size:22px;font-weight:900;color:var(--gold);display:block;line-height:1}
.stat-box .stat-key{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.stat-box.wide{grid-column:span 2}

/* DATA SECTIONS */
.data-sections{display:flex;flex-direction:column;gap:10px}
.data-section{background:#0F172A;border-radius:14px;overflow:hidden}
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;transition:.2s}
.sec-header:hover{background:rgba(255,255,255,.04)}
.sec-header-left{display:flex;align-items:center;gap:10px}
.sec-icon{font-size:16px}
.sec-name{font-size:14px;font-weight:800}
.sec-count{font-size:11px;color:var(--muted);background:#1E293B;border-radius:6px;padding:2px 8px;font-weight:700}
.sec-arrow{color:var(--muted);transition:.3s;font-size:12px}
.sec-arrow.open{transform:rotate(180deg)}
.sec-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.sec-body.open{display:block}

/* ITEM CARDS */
.item-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.item-card{background:#1E293B;border-radius:10px;padding:12px 14px}
.item-card-title{font-size:13px;font-weight:800;color:white;margin-bottom:4px}
.item-card-meta{font-size:12px;color:var(--muted);line-height:1.6;white-space:pre-wrap}
.item-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800;margin-right:6px;background:#1D4ED8;color:#BFDBFE}

/* VALIDATION */
.validation-list{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.v-item{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}
.v-item.pass{color:#86EFAC}
.v-item.fail{color:#FCA5A5}
.v-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.v-item.pass .v-dot{background:#22C55E}
.v-item.fail .v-dot{background:#EF4444}

/* JSON VIEWER */
.json-viewer{background:#0A0F1A;border-radius:10px;padding:14px;font-family:monospace;font-size:12px;color:#7DD3FC;max-height:220px;overflow:auto;line-height:1.6;border:1px solid var(--border);margin-top:12px;white-space:pre-wrap;word-break:break-all;display:none}

/* ACTIONS */
.actions{display:flex;gap:12px;flex-wrap:wrap}
.btn{border:none;border-radius:14px;padding:14px 24px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:all .2s;flex:1;min-width:140px}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:#1D4ED8;transform:translateY(-1px)}
.btn-primary:disabled{background:#334155;color:var(--muted);cursor:not-allowed;transform:none}
.btn-ghost{background:#1E293B;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:#334155;color:white}

/* STATUS */
.status-msg{border-radius:14px;padding:14px 18px;font-weight:700;font-size:14px;display:none;text-align:center}
.status-msg.show{display:block}
.status-msg.ok{background:rgba(34,197,94,.15);color:#86EFAC;border:1px solid rgba(34,197,94,.3)}
.status-msg.bad{background:rgba(239,68,68,.15);color:#FCA5A5;border:1px solid rgba(239,68,68,.3)}
.status-msg.info{background:rgba(37,99,235,.15);color:#93C5FD;border:1px solid rgba(37,99,235,.3)}

/* PROGRESS */
.progress-wrap{display:none;background:#0F172A;border-radius:999px;height:8px;overflow:hidden}
.progress-wrap.show{display:block}
.progress-bar{height:100%;background:var(--primary);border-radius:999px;width:0%;transition:width .4s}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>🎬 Campaign JSON Uploader</h1>
    <p>ارفع ملف JSON — شوف الداتا كاملة — احفظ على Supabase بضغطة</p>
  </div>

  <!-- DROP ZONE -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".json,application/json"/>
    <div class="drop-icon">📂</div>
    <div class="drop-title">اسحب ملف JSON هنا</div>
    <div class="drop-sub">أو <span>اضغط لاختيار الملف</span> من جهازك</div>
  </div>

  <!-- FILE BADGE -->
  <div class="file-badge" id="fileBadge">
    <span>✅</span>
    <span class="fname" id="fileName">—</span>
    <button class="clear-btn" id="clearBtn" title="إزالة الملف">✕</button>
  </div>

  <!-- PREVIEW CARD -->
  <div class="preview-card" id="previewCard">

    <div class="preview-title">📊 ملخص البيانات</div>
    <div class="stats-grid" id="statsGrid"></div>

    <div class="preview-title" style="font-size:14px;color:var(--muted)">✅ التحقق من البيانات</div>
    <div class="validation-list" id="validationList"></div>

    <div class="preview-title">📋 تفاصيل المحتوى</div>
    <div class="data-sections" id="dataSections"></div>

    <div style="margin-top:16px">
      <button class="btn btn-ghost" style="width:100%;font-size:13px;padding:10px" id="toggleJsonBtn">
        { } عرض الـ JSON الخام
      </button>
      <div class="json-viewer" id="jsonViewer"></div>
    </div>

  </div>

  <!-- ACTIONS -->
  <div class="actions" id="actionsRow" style="display:none">
    <button class="btn btn-ghost" id="resetBtn">🔄 رفع ملف تاني</button>
    <button class="btn btn-primary" id="saveBtn" disabled>💾 حفظ على Supabase</button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status-msg" id="statusMsg"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = window.supabase.createClient(
  "https://nnhxnswtzcqjnsmvytzr.supabase.co",
  "sb_publishable_TEVg9kp64afnKNYl-rNqBQ_c8dNHb09"
);

let parsedData = null;

const $ = id => document.getElementById(id);

function showStatus(msg, type) {
  const el = $('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg show ' + type;
}
function hideStatus() { $('statusMsg').className = 'status-msg'; }
function safe(v) {
  return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ── Drag & Drop ──────────────────────────────────────────────
const dropZone = $('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
$('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});
$('clearBtn').addEventListener('click', resetAll);
$('resetBtn').addEventListener('click', resetAll);

function resetAll() {
  parsedData = null;
  $('fileInput').value = '';
  $('fileBadge').classList.remove('show');
  $('previewCard').classList.remove('show');
  $('actionsRow').style.display = 'none';
  $('progressWrap').classList.remove('show');
  $('progressBar').style.width = '0%';
  $('saveBtn').disabled = true;
  $('saveBtn').textContent = '💾 حفظ على Supabase';
  $('saveBtn').style.background = '';
  hideStatus();
  dropZone.style.display = 'block';
}

// ── File Handler ─────────────────────────────────────────────
function handleFile(file) {
  if (!file.name.endsWith('.json') && file.type !== 'application/json') {
    showStatus('❌ الملف مش JSON — ارفع ملف بامتداد .json فقط', 'bad');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      parsedData = JSON.parse(e.target.result);
      $('fileName').textContent = file.name + '  (' + (file.size / 1024).toFixed(1) + ' KB)';
      $('fileBadge').classList.add('show');
      dropZone.style.display = 'none';
      renderPreview(parsedData);
      hideStatus();
    } catch(err) {
      showStatus('❌ الملف فيه خطأ في الـ JSON: ' + err.message, 'bad');
    }
  };
  reader.readAsText(file, 'UTF-8');
}

// ── Preview ──────────────────────────────────────────────────
function renderPreview(d) {
  // Stats
  const stats = [
    { k: 'Scripts', v: (d.scripts||[]).length, icon: '🎬' },
    { k: 'Posts', v: (d.posts||[]).length, icon: '📱' },
    { k: 'Stories', v: (d.stories||[]).length, icon: '🔮' },
    { k: 'Ads', v: (d.ads||[]).length, icon: '📣' },
    { k: 'Calendar', v: (d.calendar||[]).length, icon: '📅' },
    { k: 'Phases', v: (d.phases||[]).length, icon: '🗓' },
  ];
  let statsHtml = stats.map(s => `
    <div class="stat-box">
      <span class="stat-val">${s.icon} ${s.v}</span>
      <div class="stat-key">${s.k}</div>
    </div>
  `).join('');
  if (d.client) {
    statsHtml += `
      <div class="stat-box wide">
        <span class="stat-val" style="font-size:15px;line-height:1.3">${safe(d.client.name||'—')}</span>
        <div class="stat-key">${safe(d.client.campaignName||'—')}</div>
      </div>
    `;
  }
  $('statsGrid').innerHTML = statsHtml;

  // Validation
  const checks = [
    { label: 'client.name موجود', pass: !!(d.client?.name) },
    { label: 'hero.title موجود', pass: !!(d.hero?.title) },
    { label: 'theme.primary موجود', pass: !!(d.theme?.primary) },
    { label: 'scripts هي array', pass: Array.isArray(d.scripts) },
    { label: 'posts هي array', pass: Array.isArray(d.posts) },
    { label: 'calendar هي array', pass: Array.isArray(d.calendar) },
    { label: 'kpis موجودة', pass: !!(d.kpis) },
    { label: 'budget موجود', pass: !!(d.budget) },
  ];
  $('validationList').innerHTML = checks.map(c => `
    <div class="v-item ${c.pass?'pass':'fail'}">
      <div class="v-dot"></div>${safe(c.label)}
    </div>
  `).join('');

  // Sections
  const sections = [
    {
      name: 'Client & Hero', icon: '🎯',
      items: d.client ? [{
        title: (d.client.name||'') + (d.client.campaignName ? ' — ' + d.client.campaignName : ''),
        meta: [
          d.hero?.title ? 'Hero Title: ' + d.hero.title : '',
          d.hero?.slogan ? 'Slogan: ' + d.hero.slogan : '',
          d.client.industry ? 'Industry: ' + d.client.industry : '',
          (d.client.start||d.client.end) ? 'مدة: ' + [d.client.start,d.client.end].filter(Boolean).join(' — ') : '',
          d.client.brief ? 'Brief: ' + d.client.brief.slice(0,120) + '...' : '',
        ].filter(Boolean).join('\n')
      }] : []
    },
    {
      name: 'Scripts السكريبتات', icon: '🎬',
      items: (d.scripts||[]).map((s,i) => ({
        title: 'Script ' + (i+1) + ': ' + (s.title||'Untitled'),
        meta: [
          s.type ? 'Type: ' + s.type : '',
          s.duration ? 'Duration: ' + s.duration : '',
          s.location ? 'Location: ' + s.location : '',
          s.actors ? 'Cast: ' + s.actors : '',
          s.hook ? 'Hook: ' + s.hook : '',
        ].filter(Boolean).join('\n'),
        badge: s.type
      }))
    },
    {
      name: 'Posts البوستات', icon: '📱',
      items: (d.posts||[]).map((p,i) => ({
        title: 'Post ' + (i+1) + ': ' + (p.title||'Untitled'),
        meta: [
          p.platform ? 'Platform: ' + p.platform : '',
          p.contentType ? 'Type: ' + p.contentType : '',
          p.hook ? 'Hook: ' + p.hook : '',
          p.hashtags ? 'Hashtags: ' + p.hashtags.slice(0,60) : '',
        ].filter(Boolean).join('\n'),
        badge: p.platform
      }))
    },
    {
      name: 'Stories الستوريز', icon: '🔮',
      items: (d.stories||[]).map((s,i) => ({
        title: 'Story ' + (i+1) + (typeof s==='object' && s.platform ? ' — ' + s.platform : ''),
        meta: [
          typeof s==='object' && s.cta ? 'CTA: ' + s.cta : '',
          typeof s==='string' ? s.slice(0,100) : (s.text||'').slice(0,100),
        ].filter(Boolean).join('\n'),
        badge: typeof s==='object' ? s.platform : ''
      }))
    },
    {
      name: 'Ads Copy الإعلانات', icon: '📣',
      items: (d.ads||[]).map((a,i) => ({
        title: 'Ad ' + (i+1) + ': ' + (a.name||'Untitled'),
        meta: [
          a.adType ? 'Type: ' + a.adType : '',
          a.headline ? 'Headline: ' + a.headline : '',
          a.cta ? 'CTA: ' + a.cta : '',
        ].filter(Boolean).join('\n'),
        badge: a.adType
      }))
    },
    {
      name: 'Content Calendar', icon: '📅',
      items: (d.calendar||[]).map((c,i) => ({
        title: 'Day ' + (c.day||i+1) + ' — ' + (c.title||''),
        meta: [
          c.type ? 'Type: ' + c.type : '',
          c.platform ? 'Platform: ' + c.platform : '',
          c.status ? 'Status: ' + c.status : '',
          c.notes ? c.notes.slice(0,80) : '',
        ].filter(Boolean).join('\n'),
        badge: c.type
      }))
    },
    {
      name: 'Campaign Phases', icon: '🗓',
      items: (d.phases||[]).map((p,i) => ({
        title: 'Phase ' + (i+1) + ': ' + (p.name||''),
        meta: [
          p.duration ? 'Duration: ' + p.duration : '',
          p.goal ? 'Goal: ' + p.goal.slice(0,100) : '',
        ].filter(Boolean).join('\n')
      }))
    },
    {
      name: 'KPIs & Goals', icon: '📈',
      items: d.kpis ? Object.entries(d.kpis)
        .filter(([k,v]) => v && k !== 'successDef')
        .map(([k,v]) => ({ title: k.toUpperCase(), meta: String(v) })) : []
    },
    {
      name: 'Budget الميزانية', icon: '💰',
      items: d.budget ? [{
        title: 'Total: ' + (d.budget.total||'—'),
        meta: [
          d.budget.production ? 'إنتاج: ' + d.budget.production : '',
          d.budget.ads ? 'إعلانات: ' + d.budget.ads : '',
          d.budget.influencer ? 'مؤثرين: ' + d.budget.influencer : '',
          d.budget.currency ? 'عملة: ' + d.budget.currency : '',
        ].filter(Boolean).join('\n')
      }] : []
    },
  ];

  $('dataSections').innerHTML = sections.map((sec, si) => `
    <div class="data-section">
      <div class="sec-header" onclick="toggleSec(${si})">
        <div class="sec-header-left">
          <span class="sec-icon">${sec.icon}</span>
          <span class="sec-name">${sec.name}</span>
          <span class="sec-count">${sec.items.length}</span>
        </div>
        <span class="sec-arrow" id="arr${si}">▼</span>
      </div>
      <div class="sec-body" id="sb${si}">
        <div class="item-list">
          ${sec.items.length
            ? sec.items.map(item => `
                <div class="item-card">
                  <div class="item-card-title">
                    ${item.badge ? `<span class="item-badge">${safe(item.badge)}</span>` : ''}
                    ${safe(item.title)}
                  </div>
                  ${item.meta ? `<div class="item-card-meta">${safe(item.meta)}</div>` : ''}
                </div>
              `).join('')
            : '<div style="color:var(--muted);font-size:13px;padding:8px 0">لا يوجد بيانات</div>'
          }
        </div>
      </div>
    </div>
  `).join('');

  $('jsonViewer').textContent = JSON.stringify(d, null, 2);

  $('previewCard').classList.add('show');
  $('actionsRow').style.display = 'flex';
  $('saveBtn').disabled = false;
}

function toggleSec(i) {
  const body = $('sb' + i), arrow = $('arr' + i);
  const open = body.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

$('toggleJsonBtn').addEventListener('click', () => {
  const v = $('jsonViewer');
  const open = v.style.display === 'block';
  v.style.display = open ? 'none' : 'block';
  $('toggleJsonBtn').textContent = open ? '{ } عرض الـ JSON الخام' : '{ } إخفاء الـ JSON';
});

// ── Save to Supabase ─────────────────────────────────────────
$('saveBtn').addEventListener('click', async () => {
  if (!parsedData) return;

  const btn = $('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ جاري الحفظ...';
  showStatus('⏳ بيترفع على Supabase...', 'info');

  const pw = $('progressWrap');
  const pb = $('progressBar');
  pw.classList.add('show');
  pb.style.width = '0%';

  let prog = 0;
  const tick = setInterval(() => {
    prog = Math.min(prog + Math.random() * 18, 85);
    pb.style.width = prog + '%';
  }, 180);

  try {
    const { error } = await sb.from('campaign_content').upsert({
      id: 'main',
      data: parsedData,
      updated_at: new Date().toISOString()
    }, { onConflict: 'id' });

    clearInterval(tick);
    if (error) throw error;

    pb.style.width = '100%';
    setTimeout(() => pw.classList.remove('show'), 900);

    showStatus('✅ تم الحفظ بنجاح! افتح preview.html دلوقتي.', 'ok');
    btn.textContent = '✅ تم الحفظ!';
    btn.style.background = '#166534';

  } catch(err) {
    clearInterval(tick);
    pw.classList.remove('show');
    console.error(err);
    showStatus('❌ فشل الحفظ: ' + err.message, 'bad');
    btn.disabled = false;
    btn.textContent = '💾 حاول تاني';
    btn.style.background = '';
  }
});
</script>
</body>
</html>
